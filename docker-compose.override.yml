
services:

  messagebroker:
    container_name: messagebroker-mq
    hostname: messagebroker-mq
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
  
  mongodb:
    container_name: mongodb-process
    hostname: mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin
    volumes:
      - mongo-data:/data/db

  mongo-express:
    container_name: mongo-express
    restart: always
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: admin
      ME_CONFIG_MONGODB_AUTH_DATABASE: admin
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin

    depends_on:
      - mongodb

  streaming.producer.api:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ASPNETCORE_HTTPS_PORTS=8081
      - MessageBroker__Host=amqp://messagebroker-mq:5672
      - MessageBroker__UserName=guest
      - MessageBroker__Password=guest
      - MongoDbSettings__ConnectionString=mongodb://admin:admin@mongodb:27017/?authSource=admin
      - MongoDbSettings__DatabaseName=StreamingDb
      - MongoDbSettings__CollectionName=ProcessData
      - ElasticConfiguration__Uri=http://es01:9200
      - ApplicationName=myapp
    depends_on:
      - messagebroker
      - es01
    ports:
      - "6003:8080"
      - "6063:8081"
    volumes:
      - ${APPDATA}/Microsoft/UserSecrets:/home/app/.microsoft/usersecrets:ro
      - ${APPDATA}/Microsoft/UserSecrets:/root/.microsoft/usersecrets:ro
      - ${APPDATA}/ASP.NET/Https:/home/app/.aspnet/https:ro
      - ${APPDATA}/ASP.NET/Https:/root/.aspnet/https:ro

  streaming.processor:
    environment:
      - DOTNET_ENVIRONMENT=Development
      - MessageBroker__Host=amqp://messagebroker-mq:5672
      - MessageBroker__UserName=guest
      - MessageBroker__Password=guest
      - MongoDbSettings__ConnectionString=mongodb://admin:admin@mongodb:27017/?authSource=admin
      - MongoDbSettings__DatabaseName=StreamingDb
      - MongoDbSettings__CollectionName=ProcessData
    depends_on:
      - messagebroker
      - mongodb

  es01:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.9.0
    container_name: es01
    environment:
      - node.name=es01
      - cluster.name=es-docker-cluster
      - cluster.initial_master_nodes=es01
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - data01:/usr/share/elasticsearch/data
    ports:
      - 9200:9200
    # networks:
    #   - elastic
   
  kib01:
    image: docker.elastic.co/kibana/kibana:7.9.0
    container_name: kib01
    ports:
      - 5601:5601
    environment:
      ELASTICSEARCH_URL: http://es01:9200
      ELASTICSEARCH_HOSTS: http://es01:9200
    # networks:
    #   - elastic
  
  prometheus:
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    ports:
      - "3000:3000"